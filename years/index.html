<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRjTnSBGofmGpcMY_uEoXhgAB-FeeLjVslu1A&s">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Năm Học - ĐH Hải Phòng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-100">

    <div id="auth-loading" class="fixed inset-0 bg-white z-50 flex justify-center items-center">
        <div class="loader"></div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex-col">
        <nav class="bg-yellow-600 text-white shadow-md">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <a href="../" class="bg-yellow-700 hover:bg-yellow-800 px-3 py-1 rounded text-sm transition">
                        <i class="fas fa-arrow-left mr-1"></i> Trang chủ
                    </a>
                    <span class="font-bold text-lg border-l border-yellow-500 pl-3">Quản Lý Năm Học</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="user-display" class="text-sm font-medium">...</span>
                    <button id="btn-logout" class="text-yellow-200 hover:text-white"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </nav>

        <main class="flex-grow container mx-auto px-4 py-6 max-w-4xl">
            <div class="bg-white p-4 rounded-lg shadow mb-6 flex justify-between items-center">
                <button onclick="openModal()" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded flex items-center shadow transition">
                    <i class="fas fa-plus mr-2"></i> Thêm Năm Học Mới
                </button>
            </div>

            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="min-w-full leading-normal">
                    <thead class="bg-gray-100 text-gray-600 uppercase text-xs font-semibold">
                        <tr>
                            <th class="px-5 py-3 text-center w-16">TT</th>
                            <th class="px-5 py-3 text-left">Tên Năm Học</th>
                            <th class="px-5 py-3 text-center w-28">Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
                <div id="empty-state" class="hidden p-8 text-center text-gray-500">
                    <i class="fas fa-calendar-alt text-4xl mb-3 text-gray-300"></i><br>
                    <p class="mb-4 mt-2">Chưa có năm học nào được khởi tạo.</p>
                    <button onclick="window.seedDefaultYears()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow transition">
                        <i class="fas fa-magic mr-1"></i> Tạo tự động (2022-2027)
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL FORM -->
    <div id="year-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6 m-4">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 id="modal-title" class="text-xl font-bold">Thêm Năm Học</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="form-year" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Tên Năm Học</label>
                    <input type="text" id="year-name" class="w-full border p-2 rounded focus:ring-2 focus:ring-yellow-500 outline-none" required placeholder="VD: 2024-2025">
                </div>
                <div class="flex justify-end pt-4 gap-2">
                    <button type="button" onclick="closeModal()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded hover:bg-gray-300">Hủy</button>
                    <button type="submit" class="bg-yellow-500 text-white px-4 py-2 rounded hover:bg-yellow-600">Lưu dữ liệu</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../js/years.js"></script>
</body>
</html>
